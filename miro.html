<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MIRO — Democracy in Music</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230B0E1A'/%3E%3Ccircle cx='11' cy='9' r='5' fill='%23d4a842'/%3E%3Ccircle cx='21' cy='8' r='4' fill='%2346d2d2'/%3E%3Ccircle cx='15' cy='18' r='4.5' fill='%23a78bfa'/%3E%3Ccircle cx='8' cy='23' r='3.5' fill='%23d25a6e'/%3E%3Ccircle cx='23' cy='22' r='2.8' fill='%236aa860'/%3E%3C/svg%3E">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Georgia', serif;
            background: #F7F4EE;
            color: #1C1917;
            overflow-x: hidden;
            min-height: 100vh;
        }

        #header {
            text-align: center;
            padding: 24px 20px 8px;
        }
        
        #header h2 {
            font-size: 24px; font-weight: 400; color: #1C1917;
            line-height: 1.3; margin-top: 4px;
        }
        .header-rule {
            width: 40px; height: 1px; background: #D6D3D1;
            margin: 18px auto 0;
        }
        #header h1 {
            font-size: 15px; text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 400;
            color: #9C9590;
        }
        #header p {
            font-size: 13px;
            font-style: italic;
            color: #57534E;
            margin-top: 6px;
        }

        .section-label {
            text-align: center;
            font-size: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #444;
            padding: 14px 0 6px;
        }

        #canvas-container {
            display: flex;
            justify-content: center;
            padding: 0 20px;
        }
        #touchCanvas {
            border: 1px solid #D6D3D1;
            cursor: crosshair;
            touch-action: none;
            max-width: 100%;
            height: auto;
        }

        #controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 14px 20px;
            flex-wrap: wrap;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        label {
            font-size: 11px;
            color: #888;
            letter-spacing: 1px;
        }
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 140px;
            height: 4px;
            background: #FEFDFB;
            border-radius: 2px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #4a9eff;
            cursor: pointer;
        }
        input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #1C1917; cursor: pointer; border: none;
        }

        select {
            background: #FEFDFB;
            color: #888;
            border: 1px solid #333;
            padding: 5px 10px;
            font-family: 'Georgia', serif;
            font-size: 11px;
            letter-spacing: 1px;
            border-radius: 2px;
            cursor: pointer;
            outline: none;
        }
        select:focus { border-color: #4a9eff; }

        button {
            padding: 7px 20px;
            background: none;
            border: 1px solid #4a9eff;
            color: #4a9eff;
            font-family: 'Georgia', serif;
            font-size: 11px;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.2s;
        }
        button:hover {
            background: #4a9eff;
            color: #F7F4EE;
        }
        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            background: none;
            color: #4a9eff;
        }

        #terrain-container {
            display: flex;
            justify-content: center;
            padding: 0 20px;
            position: relative;
        }
        #terrainDiv {
            width: 780px;
            height: 380px;
            max-width: 100%;
            border: 1px solid #D6D3D1;
        }
        #terrainDiv canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
        }

        #stats {
            text-align: center;
            padding: 10px 20px 4px;
            font-size: 11px;
            color: #444;
            letter-spacing: 1px;
        }

        #info {
            text-align: center;
            padding: 16px 20px 30px;
            font-size: 11px;
            color: #3a3a3a;
            line-height: 1.7;
        }

        #terrain-hint {
            text-align: center;
            font-size: 10px;
            color: #333;
            padding: 4px 0 0;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <a href="index.html" style="position:fixed;top:12px;left:16px;font-size:11px;color:#333;text-decoration:none;letter-spacing:2px;z-index:99;font-family:Georgia,serif;">&larr; Home</a>
    <div id="header">
        <h1>MIRO</h1>
        <h2>We ask that you only touch the artwork once</h2>
        <div class="header-rule"></div>
    </div>

    <div class="section-label">Touch Canvas</div>
    <div id="canvas-container">
        <canvas id="touchCanvas" width="780" height="320"></canvas>
    </div>

    <div id="stats">
        <span id="touchCount">0</span> touches · peak intensity: <span id="peakDisplay">0</span>
    </div>

    <div id="controls">
        <div class="control-group">
            <label>Water Level</label>
            <input type="range" id="waterLevel" min="0" max="100" value="0">
            <span id="waterValue" style="font-size:11px;color:#555;min-width:28px;">0%</span>
        </div>
        <div class="control-group">
            <label>Sound</label>
            <select id="soundSelect">
                <option value="bells">Bells</option>
                <option value="strings">Strings</option>
                <option value="pad">Warm Pad</option>
                <option value="sine">Pure Sine</option>
            </select>
        </div>
        <button id="sonifyBtn">&#9835; Sonify</button>
        <button id="clearBtn">Clear</button>
    </div>

    <div class="section-label">Terrain</div>
    <div id="terrain-container">
        <div id="terrainDiv"></div>
    </div>
    <div id="terrain-hint">Click and drag to rotate</div>

    <div id="info">
        Each touch represents a voice. Overlapping touches build peaks.<br>
        Raise the water level to reveal only the strongest choices. Sonify to hear the terrain.
    </div>

    <script>
    (function() {
        // ==========================================
        // CONFIGURATION
        // ==========================================
        var GRID_COLS = 78;
        var GRID_ROWS = 32;
        var TOUCH_RADIUS = 3;
        var TOUCH_INTENSITY = 1.0;
        var SCAN_DURATION = 10;

        // Scales
        var SCALES = {
            amin: [110.00, 130.81, 146.83, 164.81, 196.00,
                   220.00, 261.63, 293.66, 329.63, 392.00,
                   440.00, 523.25, 587.33, 659.25, 783.99, 880.00]
        };

        // Pre-generate canvas texture patches for consistent rendering
        var texPatches = [];
        for (var tp = 0; tp < 40; tp++) {
            texPatches.push({
                x: Math.random() * 780,
                y: Math.random() * 320,
                w: 30 + Math.random() * 80,
                h: 20 + Math.random() * 60,
                light: Math.random() > 0.5
            });
        }

        // ==========================================
        // STATE
        // ==========================================
        var grid = new Float32Array(GRID_COLS * GRID_ROWS);
        // Store a color seed per cell
        var colorSeeds = new Float32Array(GRID_COLS * GRID_ROWS);
        for (var i = 0; i < colorSeeds.length; i++) colorSeeds[i] = Math.random();

        var maxIntensity = 0;
        var waterLevel = 0;
        var isSonifying = false;
        var scanProgress = -1;
        var audioCtx = null;
        var touchCount = 0;
        var animFrameId = null;

        // ==========================================
        // DOM
        // ==========================================
        var touchCanvas = document.getElementById('touchCanvas');
        var tCtx = touchCanvas.getContext('2d');
        var waterSlider = document.getElementById('waterLevel');
        var waterValueEl = document.getElementById('waterValue');
        var sonifyBtn = document.getElementById('sonifyBtn');
        var clearBtn = document.getElementById('clearBtn');
        var soundSelect = document.getElementById('soundSelect');
        var touchCountEl = document.getElementById('touchCount');
        var peakDisplayEl = document.getElementById('peakDisplay');

        var cellW = touchCanvas.width / GRID_COLS;
        var cellH = touchCanvas.height / GRID_ROWS;

        // ==========================================
        // THREE.JS TERRAIN SETUP
        // ==========================================
        var terrainDiv = document.getElementById('terrainDiv');
        var tWidth = 780, tHeight = 380;

        var scene = new THREE.Scene();
        var camera = new THREE.PerspectiveCamera(45, tWidth / tHeight, 0.1, 1000);
        camera.position.set(0, 6, 10);
        camera.lookAt(0, 0, 0);

        var renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(tWidth, tHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0xFEFDFB, 1);
        terrainDiv.appendChild(renderer.domElement);

        // Grid plane
        var planeW = 12;
        var planeD = 5;
        var geom = new THREE.PlaneGeometry(planeW, planeD, GRID_COLS - 1, GRID_ROWS - 1);
        geom.rotateX(-Math.PI / 2);

        var wireMat = new THREE.MeshBasicMaterial({
            color: 0xffffff,
            wireframe: true,
            transparent: true,
            opacity: 0.6,
            vertexColors: true
        });
        // Initialize vertex colors
        var colorCount = geom.attributes.position.count;
        var colors = new Float32Array(colorCount * 3);
        for (var ci = 0; ci < colorCount; ci++) {
            colors[ci * 3] = 0.27;
            colors[ci * 3 + 1] = 0.82;
            colors[ci * 3 + 2] = 0.82;
        }
        geom.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        var mesh = new THREE.Mesh(geom, wireMat);
        scene.add(mesh);

        // Scan plane (vertical, moves across)
        var scanGeom = new THREE.PlaneGeometry(0.03, 8);
        var scanMat = new THREE.MeshBasicMaterial({
            color: 0x1C1917,
            transparent: true,
            opacity: 0.0,
            side: THREE.DoubleSide
        });
        var scanMesh = new THREE.Mesh(scanGeom, scanMat);
        scanMesh.position.set(-planeW / 2, 2, 0);
        scene.add(scanMesh);

        // Water plane
        var waterGeom = new THREE.PlaneGeometry(planeW * 1.3, planeD * 1.3);
        waterGeom.rotateX(-Math.PI / 2);
        var waterMat = new THREE.MeshBasicMaterial({
            color: 0x1a7abf,
            transparent: true,
            opacity: 0.0,
            side: THREE.DoubleSide,
            depthWrite: false
        });
        var waterMesh = new THREE.Mesh(waterGeom, waterMat);
        waterMesh.position.y = 0;
        waterMesh.renderOrder = 1;
        scene.add(waterMesh);

        // Mouse orbit controls (simple)
        var isDragging = false;
        var prevMouse = { x: 0, y: 0 };
        var spherical = { theta: 0.3, phi: 0.9, radius: 15 };

        function updateCamera() {
            camera.position.x = spherical.radius * Math.sin(spherical.phi) * Math.sin(spherical.theta);
            camera.position.y = spherical.radius * Math.cos(spherical.phi);
            camera.position.z = spherical.radius * Math.sin(spherical.phi) * Math.cos(spherical.theta);
            camera.lookAt(0, 0, 0);
        }
        updateCamera();

        renderer.domElement.addEventListener('mousedown', function(e) {
            isDragging = true;
            prevMouse.x = e.clientX;
            prevMouse.y = e.clientY;
        });
        window.addEventListener('mousemove', function(e) {
            if (!isDragging) return;
            var dx = e.clientX - prevMouse.x;
            var dy = e.clientY - prevMouse.y;
            spherical.theta += dx * 0.005;
            spherical.phi = Math.max(0.2, Math.min(Math.PI * 0.48, spherical.phi + dy * 0.005));
            updateCamera();
            prevMouse.x = e.clientX;
            prevMouse.y = e.clientY;
        });
        window.addEventListener('mouseup', function() { isDragging = false; });

        // Touch orbit
        renderer.domElement.addEventListener('touchstart', function(e) {
            if (e.touches.length === 1) {
                isDragging = true;
                prevMouse.x = e.touches[0].clientX;
                prevMouse.y = e.touches[0].clientY;
            }
        }, { passive: true });
        renderer.domElement.addEventListener('touchmove', function(e) {
            if (!isDragging || e.touches.length !== 1) return;
            var dx = e.touches[0].clientX - prevMouse.x;
            var dy = e.touches[0].clientY - prevMouse.y;
            spherical.theta += dx * 0.005;
            spherical.phi = Math.max(0.2, Math.min(Math.PI * 0.48, spherical.phi + dy * 0.005));
            updateCamera();
            prevMouse.x = e.touches[0].clientX;
            prevMouse.y = e.touches[0].clientY;
        }, { passive: true });
        renderer.domElement.addEventListener('touchend', function() { isDragging = false; }, { passive: true });

        function updateTerrain() {
            var positions = geom.attributes.position;
            var colorsAttr = geom.attributes.color;
            var heightScale = 3.5;
            var waterHeight = waterLevel * heightScale;

            for (var r = 0; r < GRID_ROWS; r++) {
                for (var c = 0; c < GRID_COLS; c++) {
                    var vi = r * GRID_COLS + c;
                    var val = grid[vi];
                    var norm = maxIntensity > 0 ? val / maxIntensity : 0;
                    var h = norm * heightScale;
                    positions.setY(vi, h);

                    // Color: bright teal above water, dim blue-grey below
                    if (h > waterHeight + 0.05) {
                        // Above water: bright cyan, brighter the higher
                        var brightness = 0.5 + 0.5 * Math.min(1, (h - waterHeight) / (heightScale - waterHeight + 0.01));
                        colorsAttr.setXYZ(vi, 0.15 * brightness, 0.9 * brightness, 0.9 * brightness);
                    } else if (waterLevel > 0.01) {
                        // Below water: dim
                        colorsAttr.setXYZ(vi, 0.08, 0.2, 0.3);
                    } else {
                        // No water: normal teal
                        colorsAttr.setXYZ(vi, 0.27, 0.82, 0.82);
                    }
                }
            }
            positions.needsUpdate = true;
            colorsAttr.needsUpdate = true;
            geom.computeVertexNormals();

            // Water plane rises with water level
            if (waterLevel > 0.01) {
                waterMesh.position.y = waterHeight;
                waterMat.opacity = 0.5;
            } else {
                waterMat.opacity = 0.0;
            }
        }

        function renderTerrain() {
            updateTerrain();

            // Update scan plane
            if (scanProgress >= 0 && scanProgress <= 1) {
                scanMat.opacity = 0.6;
                scanMesh.position.x = -planeW / 2 + scanProgress * planeW;
            } else {
                scanMat.opacity = 0.0;
            }

            renderer.render(scene, camera);
        }

        // Continuous render loop for orbit
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        // ==========================================
        // TOUCH / MOUSE HANDLING
        // ==========================================
        function addTouch(cx, cy) {
            var col = Math.floor(cx / cellW);
            var row = Math.floor(cy / cellH);

            for (var dy = -TOUCH_RADIUS; dy <= TOUCH_RADIUS; dy++) {
                for (var dx = -TOUCH_RADIUS; dx <= TOUCH_RADIUS; dx++) {
                    var c = col + dx;
                    var r = row + dy;
                    if (c < 0 || c >= GRID_COLS || r < 0 || r >= GRID_ROWS) continue;

                    var dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist > TOUCH_RADIUS) continue;

                    var falloff = Math.exp(-(dist * dist) / (TOUCH_RADIUS * 0.6));
                    var idx = r * GRID_COLS + c;
                    grid[idx] += TOUCH_INTENSITY * falloff;
                    if (grid[idx] > maxIntensity) maxIntensity = grid[idx];
                }
            }

            touchCount++;
            touchCountEl.textContent = touchCount;
            peakDisplayEl.textContent = maxIntensity.toFixed(1);
            render2D();
            updateTerrain();
        }

        function canvasCoords(e) {
            var rect = touchCanvas.getBoundingClientRect();
            var sx = touchCanvas.width / rect.width;
            var sy = touchCanvas.height / rect.height;
            if (e.touches && e.touches.length > 0) {
                return {
                    x: (e.touches[0].clientX - rect.left) * sx,
                    y: (e.touches[0].clientY - rect.top) * sy
                };
            }
            return {
                x: (e.clientX - rect.left) * sx,
                y: (e.clientY - rect.top) * sy
            };
        }

        var drawing = false;
        var lastCol = -1, lastRow = -1;

        function handleStart(e) {
            drawing = true;
            lastCol = -1;
            lastRow = -1;
            var p = canvasCoords(e);
            addTouch(p.x, p.y);
            lastCol = Math.floor(p.x / cellW);
            lastRow = Math.floor(p.y / cellH);
        }

        function handleMove(e) {
            if (!drawing) return;
            var p = canvasCoords(e);
            var col = Math.floor(p.x / cellW);
            var row = Math.floor(p.y / cellH);
            if (col !== lastCol || row !== lastRow) {
                addTouch(p.x, p.y);
                lastCol = col;
                lastRow = row;
            }
        }

        function handleEnd() { drawing = false; }

        touchCanvas.addEventListener('mousedown', handleStart);
        touchCanvas.addEventListener('mousemove', handleMove);
        touchCanvas.addEventListener('mouseup', handleEnd);
        touchCanvas.addEventListener('mouseleave', handleEnd);

        touchCanvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            handleStart(e);
        }, { passive: false });
        touchCanvas.addEventListener('touchmove', function(e) {
            e.preventDefault();
            handleMove(e);
        }, { passive: false });
        touchCanvas.addEventListener('touchend', handleEnd);

        // ==========================================
        // 2D RENDERING — BLEU II CANVAS
        // ==========================================

        // Draw an organic blob shape (smooth, slightly irregular like Miró)
        function drawBlob(ctx, cx, cy, radius, seed1, seed2) {
            var points = 60;
            ctx.beginPath();
            for (var i = 0; i <= points; i++) {
                var angle = (i / points) * Math.PI * 2;
                // Gentle, low-frequency wobble for smooth organic shape
                var wobble = 1 + 0.04 * Math.sin(angle * 2 + seed1 * 20)
                               + 0.03 * Math.cos(angle * 3 + seed2 * 15);
                var r = radius * wobble;
                var x = cx + Math.cos(angle) * r;
                var y = cy + Math.sin(angle) * r;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
        }

        function render2D() {
            var w = touchCanvas.width;
            var h = touchCanvas.height;

            // Miró cerulean blue - matches Bleu II
            tCtx.fillStyle = '#1a7abf';
            tCtx.fillRect(0, 0, w, h);

            // Subtle texture: faint brush-like variation
            tCtx.save();
            tCtx.globalAlpha = 0.04;
            for (var tx = 0; tx < texPatches.length; tx++) {
                var tp = texPatches[tx];
                tCtx.fillStyle = tp.light ? '#1590d8' : '#0e6aa8';
                tCtx.fillRect(tp.x, tp.y, tp.w, tp.h);
            }
            tCtx.restore();

            if (maxIntensity === 0) {
                tCtx.fillStyle = 'rgba(255,255,255,0.15)';
                tCtx.font = 'italic 15px Georgia';
                tCtx.textAlign = 'center';
                tCtx.textBaseline = 'middle';
                tCtx.fillText('Touch or click to create', w / 2, h / 2);
                return;
            }

            for (var r = 0; r < GRID_ROWS; r++) {
                for (var c = 0; c < GRID_COLS; c++) {
                    var idx = r * GRID_COLS + c;
                    var val = grid[idx];
                    if (val <= 0) continue;

                    var norm = val / maxIntensity;
                    if (norm < waterLevel) continue;

                    var seed = colorSeeds[idx];
                    var seed2 = colorSeeds[(idx + 13) % colorSeeds.length];

                    // Size varies dramatically with intensity (like Bleu II's varied dot sizes)
                    var minRadius = cellW * 0.3;
                    var maxRadius = cellW * 3.5;
                    var radius = minRadius + (maxRadius - minRadius) * Math.pow(norm, 0.6);

                    // Slight position jitter for organic feel
                    var cx = c * cellW + cellW / 2 + (seed - 0.5) * cellW * 0.4;
                    var cy = r * cellH + cellH / 2 + (seed2 - 0.5) * cellH * 0.4;

                    // All dots are black/near-black, like Bleu II
                    var base = Math.round(25 - 15 * norm);
                    var colR = base;
                    var colG = base;
                    var colB = base + 5;
                    var alpha = 0.25 + 0.75 * Math.pow(norm, 0.5);

                    tCtx.fillStyle = 'rgba(' + colR + ',' + colG + ',' + colB + ',' + alpha + ')';
                    drawBlob(tCtx, cx, cy, radius, seed, seed2);
                    tCtx.fill();

                    // At high intensity, add a subtle shadow/ground effect
                    if (norm > 0.5) {
                        tCtx.save();
                        tCtx.globalAlpha = 0.08 * norm;
                        tCtx.fillStyle = '#000';
                        drawBlob(tCtx, cx + radius * 0.1, cy + radius * 0.15, radius * 1.05, seed, seed2);
                        tCtx.fill();
                        tCtx.restore();
                    }
                }
            }

            // Scan line - lighter for blue background
            if (scanProgress >= 0 && scanProgress <= 1) {
                var sx = scanProgress * w;
                tCtx.save();
                tCtx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                tCtx.lineWidth = 2;
                tCtx.setLineDash([4, 4]);
                tCtx.beginPath();
                tCtx.moveTo(sx, 0);
                tCtx.lineTo(sx, h);
                tCtx.stroke();
                tCtx.restore();
            }
        }

        // ==========================================
        // SONIFICATION
        // ==========================================
        function createVoice(audioCtx, type, freq, noteTime, colDur, vol, master, delay) {
            if (type === 'sine') {
                var osc = audioCtx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = freq;
                var g = audioCtx.createGain();
                g.gain.setValueAtTime(0, noteTime);
                g.gain.linearRampToValueAtTime(vol, noteTime + 0.03);
                g.gain.setValueAtTime(vol, noteTime + colDur * 0.5);
                g.gain.exponentialRampToValueAtTime(0.0001, noteTime + colDur * 2.5);
                osc.connect(g);
                g.connect(master);
                g.connect(delay);
                osc.start(noteTime);
                osc.stop(noteTime + colDur * 3);
            } else if (type === 'bells') {
                // Bell: fundamental + partials with quick decay
                var partials = [1, 2.4, 3.0, 4.5, 6.2];
                var pVols = [1, 0.5, 0.35, 0.2, 0.1];
                for (var p = 0; p < partials.length; p++) {
                    var osc = audioCtx.createOscillator();
                    osc.type = 'sine';
                    osc.frequency.value = freq * partials[p];
                    var g = audioCtx.createGain();
                    var pv = vol * pVols[p];
                    g.gain.setValueAtTime(0, noteTime);
                    g.gain.linearRampToValueAtTime(pv, noteTime + 0.005);
                    g.gain.exponentialRampToValueAtTime(0.0001, noteTime + colDur * (1.5 + p * 0.3));
                    osc.connect(g);
                    g.connect(master);
                    if (p === 0) g.connect(delay);
                    osc.start(noteTime);
                    osc.stop(noteTime + colDur * 3);
                }
            } else if (type === 'strings') {
                // Strings: sawtooth through low-pass filter, slow attack
                var osc = audioCtx.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.value = freq;
                var filt = audioCtx.createBiquadFilter();
                filt.type = 'lowpass';
                filt.frequency.value = freq * 2.5;
                filt.Q.value = 1;
                var g = audioCtx.createGain();
                g.gain.setValueAtTime(0, noteTime);
                g.gain.linearRampToValueAtTime(vol * 0.7, noteTime + colDur * 0.6);
                g.gain.setValueAtTime(vol * 0.7, noteTime + colDur);
                g.gain.exponentialRampToValueAtTime(0.0001, noteTime + colDur * 3.5);
                osc.connect(filt);
                filt.connect(g);
                g.connect(master);
                g.connect(delay);
                osc.start(noteTime);
                osc.stop(noteTime + colDur * 4);
            } else if (type === 'pad') {
                // Warm pad: detuned triangle waves
                var detunes = [-7, 0, 7, 12];
                for (var d = 0; d < detunes.length; d++) {
                    var osc = audioCtx.createOscillator();
                    osc.type = 'triangle';
                    osc.frequency.value = freq;
                    osc.detune.value = detunes[d];
                    var g = audioCtx.createGain();
                    var dv = vol * 0.35;
                    g.gain.setValueAtTime(0, noteTime);
                    g.gain.linearRampToValueAtTime(dv, noteTime + colDur * 0.8);
                    g.gain.setValueAtTime(dv, noteTime + colDur * 1.5);
                    g.gain.exponentialRampToValueAtTime(0.0001, noteTime + colDur * 4);
                    osc.connect(g);
                    g.connect(master);
                    if (d === 0) g.connect(delay);
                    osc.start(noteTime);
                    osc.stop(noteTime + colDur * 5);
                }
            }
        }

        function sonify() {
            if (isSonifying || maxIntensity === 0) return;

            isSonifying = true;
            sonifyBtn.disabled = true;
            sonifyBtn.textContent = '\u266B Starting\u2026';

            // Always create a fresh context on user gesture for max compatibility
            try {
                if (audioCtx) {
                    audioCtx.close().catch(function(){});
                }
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            } catch(e) {
                isSonifying = false;
                sonifyBtn.disabled = false;
                sonifyBtn.textContent = '\u266B Sonify';
                return;
            }

            // Wait for context to be running before scheduling
            var ctx = audioCtx;
            var startAfterResume = function() {
                sonifyBtn.textContent = '\u266B Playing\u2026';

                var soundType = soundSelect.value;
                var scaleFreqs = SCALES.amin;

                var master = ctx.createGain();
                master.gain.value = 0.2;
                master.connect(ctx.destination);

                var delay = ctx.createDelay(1.0);
                delay.delayTime.value = 0.3;
                var fbGain = ctx.createGain();
                fbGain.gain.value = 0.2;
                var delayFilter = ctx.createBiquadFilter();
                delayFilter.type = 'lowpass';
                delayFilter.frequency.value = 2000;
                delay.connect(delayFilter);
                delayFilter.connect(fbGain);
                fbGain.connect(delay);
                fbGain.connect(master);

                var startTime = ctx.currentTime + 0.15;
                var colDur = SCAN_DURATION / GRID_COLS;

                for (var c = 0; c < GRID_COLS; c++) {
                    var noteTime = startTime + c * colDur;

                    for (var r = 0; r < GRID_ROWS; r++) {
                        var idx = r * GRID_COLS + c;
                        var val = grid[idx];
                        if (val <= 0) continue;

                        var norm = val / maxIntensity;
                        if (norm < waterLevel) continue;

                        var freqIdx = Math.round((1 - r / (GRID_ROWS - 1)) * (scaleFreqs.length - 1));
                        freqIdx = Math.max(0, Math.min(scaleFreqs.length - 1, freqIdx));
                        var freq = scaleFreqs[freqIdx];

                        var vol = 0.06 * norm;
                        createVoice(ctx, soundType, freq, noteTime, colDur, vol, master, delay);
                    }
                }

                var animStartMs = performance.now() + 150;
                var animDurMs = SCAN_DURATION * 1000;

                function tick(ts) {
                    var elapsed = ts - animStartMs;
                    var p = elapsed / animDurMs;

                    if (p >= 1.02) {
                        scanProgress = -1;
                        isSonifying = false;
                        sonifyBtn.disabled = false;
                        sonifyBtn.textContent = '\u266B Sonify';
                        render2D();
                        renderTerrain();
                        animFrameId = null;
                        return;
                    }

                    scanProgress = Math.max(0, Math.min(1, p));
                    render2D();
                    renderTerrain();
                    animFrameId = requestAnimationFrame(tick);
                }

                animFrameId = requestAnimationFrame(tick);
            };

            // Resume and wait for it to actually start
            if (ctx.state === 'suspended') {
                ctx.resume().then(startAfterResume).catch(function() {
                    isSonifying = false;
                    sonifyBtn.disabled = false;
                    sonifyBtn.textContent = '\u266B Sonify';
                });
            } else {
                startAfterResume();
            }
        }

        // ==========================================
        // CONTROLS
        // ==========================================
        waterSlider.addEventListener('input', function() {
            waterLevel = this.value / 100;
            waterValueEl.textContent = this.value + '%';
            render2D();
            updateTerrain();
        });

        sonifyBtn.addEventListener('click', sonify);

        clearBtn.addEventListener('click', function() {
            grid.fill(0);
            for (var i = 0; i < colorSeeds.length; i++) colorSeeds[i] = Math.random();
            maxIntensity = 0;
            waterLevel = 0;
            waterSlider.value = 0;
            waterValueEl.textContent = '0%';
            scanProgress = -1;
            touchCount = 0;
            touchCountEl.textContent = '0';
            peakDisplayEl.textContent = '0';
            if (animFrameId) {
                cancelAnimationFrame(animFrameId);
                animFrameId = null;
            }
            isSonifying = false;
            sonifyBtn.disabled = false;
            sonifyBtn.textContent = '\u266B Sonify';
            render2D();
            updateTerrain();
        });

        // ==========================================
        // INITIAL RENDER
        // ==========================================
        render2D();
        updateTerrain();

    })();
    </script>
</body>
