<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Assembly — Democracy in Music</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230B0E1A'/%3E%3Ccircle cx='11' cy='9' r='5' fill='%23d4a842'/%3E%3Ccircle cx='21' cy='8' r='4' fill='%2346d2d2'/%3E%3Ccircle cx='15' cy='18' r='4.5' fill='%23a78bfa'/%3E%3Ccircle cx='8' cy='23' r='3.5' fill='%23d25a6e'/%3E%3Ccircle cx='23' cy='22' r='2.8' fill='%236aa860'/%3E%3C/svg%3E">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'EB Garamond', Georgia, serif;
            background: #0a0a1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            padding: 24px 20px 40px;
        }
        a.home { position: fixed; top: 12px; left: 16px; font-size: 11px; color: #333; text-decoration: none; letter-spacing: 2px; z-index: 99; }
        #header { text-align: center; margin-bottom: 24px; }
        #header h1 { font-size: 28px; letter-spacing: 8px; font-weight: 300; color: #fff; }
        #header p { font-size: 14px; font-style: italic; color: #777; margin-top: 6px; }

        /* Progress */
        #progress { display: flex; gap: 12px; margin-bottom: 32px; }
        .prog-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: #1a1a2e; border: 1px solid #2a2a44; transition: all 0.4s;
        }
        .prog-dot.done { background: #a78bfa; border-color: #a78bfa; }
        .prog-dot.current { background: none; border-color: #a78bfa; box-shadow: 0 0 8px rgba(167,139,250,0.3); }

        /* Step container */
        #step { max-width: 520px; width: 100%; text-align: center; }
        #layer-name {
            font-size: 12px; letter-spacing: 4px; text-transform: uppercase;
            color: #a78bfa; margin-bottom: 6px;
        }
        #step-prompt {
            font-size: 20px; color: #ccc; margin-bottom: 24px; font-style: italic;
        }

        /* Option cards */
        #options { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
        .opt-card {
            width: 110px; padding: 18px 8px; border: 1px solid #1a1a2e; border-radius: 6px;
            background: #0f0f1e; cursor: pointer; transition: all 0.2s; text-align: center;
            user-select: none; -webkit-user-select: none;
        }
        .opt-card:hover { border-color: #2a2a44; background: #12122a; }
        .opt-card.previewing { border-color: #a78bfa; background: #140f28; box-shadow: 0 0 16px rgba(167,139,250,0.1); }
        .opt-card .opt-name { font-size: 15px; color: #ddd; letter-spacing: 1px; margin-bottom: 4px; }
        .opt-card.previewing .opt-name { color: #c4b5fd; }
        .opt-card .opt-hint { font-size: 10px; color: #3a3a50; font-style: italic; }
        .opt-card.previewing .opt-hint { color: #7a6a9a; }

        /* Vote bar (shown during reveal) */
        .opt-card .vote-bar-wrap {
            height: 4px; background: #1a1a2e; border-radius: 2px; margin-top: 10px;
            overflow: hidden; display: none;
        }
        .opt-card .vote-bar {
            height: 100%; background: #a78bfa; border-radius: 2px;
            transition: width 0.8s ease; width: 0%;
        }
        .opt-card .vote-count {
            font-size: 10px; color: #555; margin-top: 4px; min-height: 14px; display: none;
        }
        .opt-card.winner { border-color: #a78bfa; background: #1a1030; }
        .opt-card.winner .opt-name { color: #fff; }
        .opt-card.winner .vote-bar { background: #a78bfa; }
        .opt-card.you-voted .opt-hint { color: #a78bfa; }

        /* Action button */
        #action-area { min-height: 60px; display: flex; align-items: center; justify-content: center; }
        .action-btn {
            padding: 10px 32px; background: none; border: 1px solid #a78bfa; color: #a78bfa;
            font-family: 'EB Garamond', Georgia, serif; font-size: 14px; letter-spacing: 1px;
            cursor: pointer; border-radius: 4px; transition: all 0.2s;
        }
        .action-btn:hover { background: #a78bfa; color: #0a0a1a; }
        .action-btn:disabled { opacity: 0.3; cursor: default; }
        .action-btn:disabled:hover { background: none; color: #a78bfa; }

        /* Status text */
        #status {
            font-size: 15px; color: #999; margin-top: 20px; min-height: 24px;
            letter-spacing: 0.5px; text-align: center; transition: color 0.3s;
        }
        #status.highlight { color: #c4b5fd; }

        /* Result screen */
        #result { display: none; max-width: 680px; width: 100%; text-align: center; }
        #result h2 { font-size: 22px; font-weight: 400; color: #ccc; margin-bottom: 20px; }
        #result-grid { padding: 0 8px; }
        .result-grid-row { display: flex; align-items: center; margin-bottom: 5px; }
        .result-grid-label {
            width: 64px; font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
            color: #555; text-align: right; padding-right: 10px; flex-shrink: 0;
        }
        .result-grid-cells { display: flex; gap: 5px; flex: 1; }
        .result-cell {
            flex: 1; padding: 12px 4px; border: 1px solid #1a1a2e; border-radius: 4px;
            background: #0f0f1e; text-align: center; transition: all 0.3s;
        }
        .result-cell .rc-name { font-size: 11px; color: #3a3a50; letter-spacing: 0.5px; }
        .result-cell.is-winner { border-color: #a78bfa; background: #1a1030; transition: all 0.12s; }
        .result-cell.is-winner .rc-name { color: #c4b5fd; }
        .result-cell.is-winner.flash { background: #2a1850; border-color: #c4b5fd; }
        .result-cell.is-winner.flash .rc-name { color: #fff; }
        .result-cell.is-yours { position: relative; }
        .result-cell.is-yours::after {
            content: 'you'; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%);
            font-size: 7px; color: #a78bfa; letter-spacing: 1px;
        }
        #result-transport { margin-top: 20px; display: flex; gap: 12px; justify-content: center; }
    </style>
</head>
<body>
    <a class="home" href="index.html">&larr; Home</a>

    <div id="header">
        <h1>ASSEMBLY</h1>
        <p>Build a piece of music, one vote at a time</p>
    </div>

    <div id="progress"></div>

    <div id="step">
        <div id="layer-name"></div>
        <div id="step-prompt">Tap to preview, then cast your vote</div>
        <div id="options"></div>
        <div id="action-area">
            <button class="action-btn" id="voteBtn" disabled>Cast Vote</button>
        </div>
        <div id="status"></div>
    </div>

    <div id="result">
        <h2>What we chose together</h2>
        <div id="result-grid"></div>
        <div id="result-transport">
            <button class="action-btn" id="stopBtn">&#9632; Stop</button>
            <button class="action-btn" id="againBtn">New Round</button>
        </div>
    </div>


    <script>
    (function() {
        var LAYERS = [
            { name: 'Rhythm', variations: ['Pulse', 'Scatter', 'Sway', 'Drift'] },
            { name: 'Bass', variations: ['Root', 'Walk', 'Throb', 'Sub'] },
            { name: 'Chords', variations: ['Warm', 'Glass', 'Hollow', 'Open'] },
            { name: 'Melody', variations: ['Arc', 'Steps', 'Float', 'Call'] },
            { name: 'Texture', variations: ['Rain', 'Hum', 'Crackle', 'Wind'] }
        ];
        var PROMPTS = [
            'Choose a rhythm',
            'Add a bass line',
            'Pick the chords',
            'Choose a melody',
            'Add a texture'
        ];
        var NOTES = {
            C2: 65.41, Eb2: 77.78, F2: 87.31, G2: 98.00, Bb2: 116.54,
            C3: 130.81, Eb3: 155.56, F3: 174.61, G3: 196.00, Bb3: 233.08,
            C4: 261.63, Eb4: 311.13, F4: 349.23, G4: 392.00, Bb4: 466.16,
            C5: 523.25, Eb5: 622.25, G5: 783.99
        };
        var BPM = 76, STEPS = 16, CROWD_SIZE = 24;

        // State
        var currentLayer = 0;
        var phase = 'preview'; // preview | revealed | done
        var userChoice = -1; // which option the user picked for current layer
        var userChoices = []; // all user choices
        var winners = []; // winning variation index (1-indexed for audio) per layer
        var crowdVotes = []; // votes per option for current layer
        var resultWinnerCells = []; // DOM refs to winning cells in result grid

        // Audio
        var audioCtx = null, masterGain = null, reverbSend = null, compressor = null, masterFilter = null;
        var isPlaying = false, currentStep = -1, nextStepTime = 0, schedulerTimer = null;
        var activeVariation = [0, 0, 0, 0, 0]; // 0 = silent, 1-4 = variations
        var mutedLayers = [false, false, false, false, false];

        // DOM
        var progress = document.getElementById('progress');
        var layerName = document.getElementById('layer-name');
        var stepPrompt = document.getElementById('step-prompt');
        var optionsEl = document.getElementById('options');
        var voteBtn = document.getElementById('voteBtn');
        var statusEl = document.getElementById('status');
        var stepEl = document.getElementById('step');
        var resultEl = document.getElementById('result');
        var resultGrid = document.getElementById('result-grid');
        var againBtn = document.getElementById('againBtn');
        var stopBtn = document.getElementById('stopBtn');

        // Progress dots
        for (var i = 0; i < LAYERS.length; i++) {
            var d = document.createElement('div');
            d.className = 'prog-dot';
            progress.appendChild(d);
        }

        function updateProgress() {
            var dots = progress.querySelectorAll('.prog-dot');
            for (var i = 0; i < dots.length; i++) {
                dots[i].className = 'prog-dot';
                if (i < currentLayer) dots[i].classList.add('done');
                else if (i === currentLayer && phase !== 'done') dots[i].classList.add('current');
                else if (phase === 'done') dots[i].classList.add('done');
            }
        }

        // ==========================================
        // STEP FLOW
        // ==========================================
        function showStep() {
            phase = 'preview';
            userChoice = -1;
            var layer = LAYERS[currentLayer];

            layerName.textContent = layer.name;
            stepPrompt.textContent = PROMPTS[currentLayer];
            optionsEl.innerHTML = '';
            statusEl.textContent = currentLayer === 0 ? 'Tap a block to hear it' : 'Tap to hear how it fits';
            statusEl.className = '';
            voteBtn.disabled = true;
            voteBtn.textContent = 'Cast Vote';
            voteBtn.style.display = '';

            layer.variations.forEach(function(name, vi) {
                var card = document.createElement('div');
                card.className = 'opt-card';
                card.innerHTML = '<div class="opt-name">' + name + '</div>' +
                    '<div class="opt-hint">tap to preview</div>' +
                    '<div class="vote-bar-wrap"><div class="vote-bar"></div></div>' +
                    '<div class="vote-count"></div>';
                card.addEventListener('click', function() { handleOptionTap(vi); });
                optionsEl.appendChild(card);
            });

            updateProgress();
        }

        function handleOptionTap(vi) {
            if (phase !== 'preview') return;

            userChoice = vi;
            voteBtn.disabled = false;

            // Update card states
            var cards = optionsEl.querySelectorAll('.opt-card');
            cards.forEach(function(c, i) {
                c.className = 'opt-card' + (i === vi ? ' previewing' : '');
                c.querySelector('.opt-hint').textContent = i === vi ? 'your choice' : 'tap to preview';
            });

            statusEl.textContent = '';

            // Preview this variation
            activeVariation[currentLayer] = vi + 1; // +1 because audio uses 1-indexed (0 = silence)
            if (!isPlaying) startPlayback();
        }

        function castVote() {
            if (userChoice < 0 || phase !== 'preview') return;
            phase = 'revealed';
            voteBtn.disabled = true;
            voteBtn.style.display = 'none';
            userChoices[currentLayer] = userChoice;

            // Generate crowd votes
            crowdVotes = [];
            var favorite = Math.floor(Math.random() * 4);
            for (var i = 0; i < 4; i++) {
                if (i === favorite) crowdVotes[i] = 6 + Math.floor(Math.random() * 6);
                else crowdVotes[i] = 1 + Math.floor(Math.random() * 5);
            }
            // Add user vote
            crowdVotes[userChoice]++;

            // Find winner
            var maxV = 0, winIdx = 0;
            for (var i = 0; i < 4; i++) {
                if (crowdVotes[i] > maxV) { maxV = crowdVotes[i]; winIdx = i; }
            }
            winners[currentLayer] = winIdx + 1; // 1-indexed for audio

            // Reveal animation
            statusEl.textContent = 'Counting votes\u2026';
            statusEl.className = 'highlight';
            var cards = optionsEl.querySelectorAll('.opt-card');
            var total = 0;
            for (var i = 0; i < 4; i++) total += crowdVotes[i];

            // Show bars
            cards.forEach(function(c) {
                c.querySelector('.vote-bar-wrap').style.display = '';
                c.querySelector('.vote-count').style.display = '';
            });

            // Animate bars after a beat
            setTimeout(function() {
                cards.forEach(function(c, i) {
                    var pct = (crowdVotes[i] / total) * 100;
                    c.querySelector('.vote-bar').style.width = pct + '%';
                    c.querySelector('.vote-count').textContent = crowdVotes[i] + ' vote' + (crowdVotes[i] !== 1 ? 's' : '');
                    if (i === userChoice) {
                        c.classList.add('you-voted');
                        c.querySelector('.opt-hint').textContent = 'you voted';
                    }
                });
            }, 300);

            // Reveal winner after bars animate
            setTimeout(function() {
                cards.forEach(function(c, i) {
                    if (i === winIdx) c.classList.add('winner');
                    else { c.style.opacity = '0.4'; }
                });

                // Set the winning variation for playback
                activeVariation[currentLayer] = winners[currentLayer];

                var youWon = userChoice === winIdx;
                statusEl.textContent = youWon
                    ? 'Your choice won'
                    : 'The group chose ' + LAYERS[currentLayer].variations[winIdx];
                statusEl.className = 'highlight';

                // Show next button
                setTimeout(function() {
                    voteBtn.style.display = '';
                    voteBtn.disabled = false;
                    if (currentLayer < LAYERS.length - 1) {
                        voteBtn.textContent = 'Next Layer \u2192';
                    } else {
                        voteBtn.textContent = 'See the Result';
                    }
                }, 600);
            }, 1200);
        }

        function advanceToNext() {
            if (phase === 'revealed') {
                currentLayer++;
                if (currentLayer >= LAYERS.length) {
                    showResult();
                } else {
                    showStep();
                }
            }
        }

        function showResult() {
            phase = 'done';
            stepEl.style.display = 'none';
            resultEl.style.display = 'block';
            updateProgress();
            resultGrid.innerHTML = '';
            resultWinnerCells = [];

            LAYERS.forEach(function(layer, li) {
                var row = document.createElement('div');
                row.className = 'result-grid-row';

                var label = document.createElement('div');
                label.className = 'result-grid-label';
                label.textContent = layer.name;
                row.appendChild(label);

                var cells = document.createElement('div');
                cells.className = 'result-grid-cells';

                layer.variations.forEach(function(name, vi) {
                    var cell = document.createElement('div');
                    cell.className = 'result-cell';
                    if ((vi + 1) === winners[li]) {
                        cell.classList.add('is-winner');
                        resultWinnerCells[li] = cell;
                    }
                    if (vi === userChoices[li]) cell.classList.add('is-yours');
                    cell.innerHTML = '<div class="rc-name">' + name + '</div>';
                    cells.appendChild(cell);
                });

                row.appendChild(cells);
                resultGrid.appendChild(row);
            });
        }

        function resetAll() {
            currentLayer = 0;
            userChoices = [];
            winners = [];
            activeVariation = [0, 0, 0, 0, 0];
            resultWinnerCells = [];
            stepEl.style.display = '';
            resultEl.style.display = 'none';
            stopBtn.textContent = '\u25A0 Stop';
            if (isPlaying) stopPlayback();
            showStep();
        }

        // Event listeners
        voteBtn.addEventListener('click', function() {
            if (phase === 'preview') castVote();
            else if (phase === 'revealed') advanceToNext();
        });
        againBtn.addEventListener('click', resetAll);
        stopBtn.addEventListener('click', function() {
            if (isPlaying) {
                stopPlayback();
                stopBtn.textContent = '\u25B6 Play';
            } else {
                startPlayback();
                stopBtn.textContent = '\u25A0 Stop';
            }
        });

        // ==========================================
        // AUDIO ENGINE
        // ==========================================
        function buildAudioGraph() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            var ctx = audioCtx;
            compressor = ctx.createDynamicsCompressor();
            compressor.threshold.value = -24; compressor.knee.value = 12;
            compressor.ratio.value = 4; compressor.attack.value = 0.01; compressor.release.value = 0.15;
            compressor.connect(ctx.destination);
            masterFilter = ctx.createBiquadFilter();
            masterFilter.type = 'lowpass'; masterFilter.frequency.value = 5000; masterFilter.Q.value = 0.5;
            masterFilter.connect(compressor);
            masterGain = ctx.createGain(); masterGain.gain.value = 0.7; masterGain.connect(masterFilter);
            reverbSend = ctx.createGain(); reverbSend.gain.value = 0.35;
            var delays = [0.037, 0.079, 0.113, 0.151, 0.197, 0.251];
            var reverbMix = ctx.createGain(); reverbMix.gain.value = 0.4; reverbMix.connect(masterFilter);
            delays.forEach(function(dt) {
                var d = ctx.createDelay(1.0); d.delayTime.value = dt;
                var g = ctx.createGain(); g.gain.value = 0.18;
                var f = ctx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 2500 - dt * 4000; f.Q.value = 0.3;
                reverbSend.connect(d); d.connect(f); f.connect(g); g.connect(d); g.connect(reverbMix);
            });
        }
        function stepDuration() { return 60.0 / BPM / 4; }
        function connectDry(node) { node.connect(masterGain); }
        function connectWet(node, amount) {
            var g = audioCtx.createGain(); g.gain.value = amount || 1; node.connect(g); g.connect(reverbSend);
        }

        // --- RHYTHM ---
        function scheduleRhythm(variation, time, dur) {
            if (variation === 0) return;
            var ctx = audioCtx, s = currentStep % STEPS;
            function softHit(t, freq, vol, decay) {
                var len = ctx.sampleRate * decay, buf = ctx.createBuffer(1, len, ctx.sampleRate), d = buf.getChannelData(0);
                for (var i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (len * 0.2));
                var src = ctx.createBufferSource(); src.buffer = buf;
                var f = ctx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = freq; f.Q.value = 1.2;
                var g = ctx.createGain(); g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.0001, t + decay);
                src.connect(f); f.connect(g); connectDry(g); connectWet(g, 0.3); src.start(t);
            }
            function softKick(t, vol) {
                var osc = ctx.createOscillator(); osc.type = 'sine';
                osc.frequency.setValueAtTime(90, t); osc.frequency.exponentialRampToValueAtTime(35, t + 0.15);
                var g = ctx.createGain(); g.gain.setValueAtTime(vol, t); g.gain.setValueAtTime(vol * 0.8, t + 0.05);
                g.gain.exponentialRampToValueAtTime(0.0001, t + 0.35);
                osc.connect(g); connectDry(g); osc.start(t); osc.stop(t + 0.4);
            }
            if (variation === 1) { if (s % 4 === 0) softKick(time, 0.2); if (s % 2 === 0) softHit(time, 7000, 0.04, 0.06); }
            else if (variation === 2) { if (s % 4 === 0) softKick(time, 0.15); if (Math.random() > 0.5) softHit(time + Math.random() * dur * 0.3, 5000 + Math.random() * 4000, 0.025, 0.04); }
            else if (variation === 3) { if (s % 8 === 0 || s === 6) softKick(time, 0.15); if (s % 3 === 0) softHit(time, 6000, 0.03, 0.07); }
            else if (variation === 4) { if (s === 0 || s === 5 || s === 10) softKick(time, 0.12); if (s % 5 === 2) softHit(time, 4000, 0.02, 0.09); }
        }
        // --- BASS ---
        function scheduleBass(variation, time, dur) {
            if (variation === 0) return;
            var ctx = audioCtx, s = currentStep % STEPS;
            function bassNote(t, freq, length, vol) {
                var osc1 = ctx.createOscillator(); osc1.type = 'sine'; osc1.frequency.value = freq;
                var osc2 = ctx.createOscillator(); osc2.type = 'triangle'; osc2.frequency.value = freq;
                var f = ctx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = freq * 3; f.Q.value = 0.7;
                var g1 = ctx.createGain(); g1.gain.value = vol * 0.7;
                var g2 = ctx.createGain(); g2.gain.value = vol * 0.3;
                var master = ctx.createGain();
                master.gain.setValueAtTime(0, t); master.gain.linearRampToValueAtTime(1, t + 0.025);
                master.gain.setValueAtTime(1, t + length * 0.6); master.gain.exponentialRampToValueAtTime(0.001, t + length);
                osc1.connect(g1); g1.connect(f); osc2.connect(g2); g2.connect(f);
                f.connect(master); connectDry(master); connectWet(master, 0.15);
                osc1.start(t); osc1.stop(t + length + 0.1); osc2.start(t); osc2.stop(t + length + 0.1);
            }
            if (variation === 1) { if (s % 8 === 0) bassNote(time, NOTES.C2, dur * 6, 0.18); }
            else if (variation === 2) { var walk = [NOTES.C2, 0, 0, NOTES.Eb2, 0, 0, NOTES.F2, 0, 0, NOTES.G2, 0, 0, NOTES.Bb2, 0, 0, 0]; if (walk[s]) bassNote(time, walk[s], dur * 2.5, 0.14); }
            else if (variation === 3) { if (s % 4 === 0) bassNote(time, NOTES.C2, dur * 3.5, 0.16); }
            else if (variation === 4) { if (s % 16 === 0) { var osc = ctx.createOscillator(); osc.type = 'sine'; osc.frequency.value = NOTES.C2 * 0.5; var g = ctx.createGain(); g.gain.setValueAtTime(0, time); g.gain.linearRampToValueAtTime(0.22, time + dur * 4); g.gain.setValueAtTime(0.22, time + dur * 10); g.gain.exponentialRampToValueAtTime(0.001, time + dur * 16); osc.connect(g); connectDry(g); osc.start(time); osc.stop(time + dur * 17); } }
        }
        // --- CHORDS ---
        function scheduleChords(variation, time, dur) {
            if (variation === 0) return;
            var ctx = audioCtx, s = currentStep % STEPS;
            if (s % 8 !== 0) return;
            var chordSets = { 1: [NOTES.C3, NOTES.Eb3, NOTES.G3, NOTES.Bb3], 2: [NOTES.C4, NOTES.G4, NOTES.C5], 3: [NOTES.C3, NOTES.F3, NOTES.Bb3], 4: [NOTES.G3, NOTES.C4, NOTES.Eb4, NOTES.Bb4] };
            var notes = chordSets[variation]; if (!notes) return;
            var length = dur * 7, waveType = variation === 2 ? 'sine' : 'triangle';
            notes.forEach(function(freq) {
                for (var d = -1; d <= 1; d += 2) {
                    var osc = ctx.createOscillator(); osc.type = waveType; osc.frequency.value = freq; osc.detune.value = d * (variation === 2 ? 3 : 6);
                    var g = ctx.createGain(); var vol = 0.025;
                    g.gain.setValueAtTime(0, time); g.gain.linearRampToValueAtTime(vol, time + dur * 3);
                    g.gain.setValueAtTime(vol * 0.8, time + length * 0.7); g.gain.exponentialRampToValueAtTime(0.001, time + length);
                    osc.connect(g); connectDry(g); connectWet(g, 0.6); osc.start(time); osc.stop(time + length + 0.2);
                }
            });
        }
        // --- MELODY ---
        var melodyData = { 1: [NOTES.C4,0,0,NOTES.Eb4,0,0,NOTES.G4,0,0,0,NOTES.F4,0,0,NOTES.Eb4,0,0], 2: [NOTES.G4,0,0,0,NOTES.Bb4,0,0,0,NOTES.C5,0,0,0,NOTES.Bb4,0,0,0], 3: [0,0,0,NOTES.Eb5,0,0,0,0,0,0,0,NOTES.C5,0,0,0,0], 4: [NOTES.G4,0,0,0,0,0,0,0,0,0,NOTES.Bb4,0,NOTES.G4,0,0,0] };
        function scheduleMelody(variation, time, dur) {
            if (variation === 0 || !melodyData[variation]) return;
            var s = currentStep % STEPS, freq = melodyData[variation][s]; if (!freq) return;
            var ctx = audioCtx, length = dur * 4;
            var osc1 = ctx.createOscillator(); osc1.type = 'sine'; osc1.frequency.value = freq;
            var osc2 = ctx.createOscillator(); osc2.type = 'sine'; osc2.frequency.value = freq * 2.01;
            var g1 = ctx.createGain(); g1.gain.value = 0.07; var g2 = ctx.createGain(); g2.gain.value = 0.015;
            var env = ctx.createGain();
            env.gain.setValueAtTime(0, time); env.gain.linearRampToValueAtTime(1, time + 0.04);
            env.gain.setValueAtTime(0.7, time + length * 0.4); env.gain.exponentialRampToValueAtTime(0.001, time + length);
            osc1.connect(g1); g1.connect(env); osc2.connect(g2); g2.connect(env);
            connectDry(env); connectWet(env, 0.5);
            osc1.start(time); osc1.stop(time + length + 0.1); osc2.start(time); osc2.stop(time + length + 0.1);
        }
        // --- TEXTURE ---
        function scheduleTexture(variation, time, dur) {
            if (variation === 0) return;
            var ctx = audioCtx, s = currentStep % STEPS;
            if (variation === 1) { if (Math.random() > 0.55) { var len = ctx.sampleRate * 0.04, buf = ctx.createBuffer(1, len, ctx.sampleRate), data = buf.getChannelData(0); for (var i = 0; i < len; i++) data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (len * 0.25)); var src = ctx.createBufferSource(); src.buffer = buf; var f = ctx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 4000 + Math.random() * 6000; f.Q.value = 3; var g = ctx.createGain(); g.gain.value = 0.012; src.connect(f); f.connect(g); connectDry(g); connectWet(g, 0.7); src.start(time + Math.random() * dur * 0.6); } }
            else if (variation === 2 && s % 8 === 0) { var osc1 = ctx.createOscillator(); osc1.type = 'sine'; osc1.frequency.value = NOTES.G3; var osc2 = ctx.createOscillator(); osc2.type = 'sine'; osc2.frequency.value = NOTES.G3 * 1.003; var g = ctx.createGain(); g.gain.setValueAtTime(0, time); g.gain.linearRampToValueAtTime(0.025, time + dur * 4); g.gain.exponentialRampToValueAtTime(0.001, time + dur * 8); osc1.connect(g); osc2.connect(g); connectDry(g); connectWet(g, 0.8); osc1.start(time); osc1.stop(time + dur * 9); osc2.start(time); osc2.stop(time + dur * 9); }
            else if (variation === 3 && Math.random() > 0.65) { var len = ctx.sampleRate * 0.008, buf = ctx.createBuffer(1, len, ctx.sampleRate), data = buf.getChannelData(0); for (var i = 0; i < len; i++) data[i] = (Math.random() * 2 - 1); var src = ctx.createBufferSource(); src.buffer = buf; var g = ctx.createGain(); g.gain.value = 0.008; src.connect(g); connectDry(g); src.start(time + Math.random() * dur); }
            else if (variation === 4 && s % 4 === 0) { var len = ctx.sampleRate * 0.6, buf = ctx.createBuffer(1, len, ctx.sampleRate), data = buf.getChannelData(0); for (var i = 0; i < len; i++) data[i] = (Math.random() * 2 - 1); var src = ctx.createBufferSource(); src.buffer = buf; var f = ctx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 300 + Math.random() * 400; f.Q.value = 0.4; var g = ctx.createGain(); g.gain.setValueAtTime(0, time); g.gain.linearRampToValueAtTime(0.02, time + 0.2); g.gain.exponentialRampToValueAtTime(0.001, time + 0.6); src.connect(f); f.connect(g); connectDry(g); connectWet(g, 0.5); src.start(time); }
        }

        var schedulers = [scheduleRhythm, scheduleBass, scheduleChords, scheduleMelody, scheduleTexture];

        function scheduleStep(time) {
            var dur = stepDuration();
            for (var li = 0; li < LAYERS.length; li++) { schedulers[li](activeVariation[li], time, dur); }
        }
        function advanceSeqStep() {
            currentStep++;
            var s = currentStep % STEPS;

            // Flash result grid cells on beats
            if (phase === 'done' && s % 4 === 0 && resultWinnerCells.length > 0) {
                resultWinnerCells.forEach(function(cell, li) {
                    if (!cell) return;
                    setTimeout(function() {
                        cell.classList.add('flash');
                        setTimeout(function() { cell.classList.remove('flash'); }, 180);
                    }, li * 60); // stagger: ripple top to bottom
                });
            }
        }
        function scheduler() {
            if (!audioCtx || !isPlaying) return;
            while (nextStepTime < audioCtx.currentTime + 0.12) {
                scheduleStep(nextStepTime); advanceSeqStep(); nextStepTime += stepDuration();
            }
            schedulerTimer = setTimeout(scheduler, 20);
        }
        function startPlayback() {
            if (audioCtx) audioCtx.close().catch(function(){});
            buildAudioGraph();
            if (audioCtx.state === 'suspended') audioCtx.resume().then(beginPlay);
            else beginPlay();
        }
        function beginPlay() {
            isPlaying = true; currentStep = -1; nextStepTime = audioCtx.currentTime + 0.05;
            scheduler();
        }
        function stopPlayback() {
            isPlaying = false;
            if (schedulerTimer) { clearTimeout(schedulerTimer); schedulerTimer = null; }
            if (audioCtx) { audioCtx.close().catch(function(){}); audioCtx = null; }
        }

        // Init
        showStep();
    })();
    </script>
