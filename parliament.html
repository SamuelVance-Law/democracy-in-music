<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Parliament — Democracy in Music</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230B0E1A'/%3E%3Ccircle cx='11' cy='9' r='5' fill='%23d4a842'/%3E%3Ccircle cx='21' cy='8' r='4' fill='%2346d2d2'/%3E%3Ccircle cx='15' cy='18' r='4.5' fill='%23a78bfa'/%3E%3Ccircle cx='8' cy='23' r='3.5' fill='%23d25a6e'/%3E%3Ccircle cx='23' cy='22' r='2.8' fill='%236aa860'/%3E%3C/svg%3E">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'EB Garamond', Georgia, serif;
            background: #08080e;
            color: #c8c4bc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        #grain {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 9999; opacity: 0.025;
        }

        a.home-link {
            position: fixed; top: 12px; left: 16px;
            font-size: 12px; color: #887a60; text-decoration: none;
            letter-spacing: 2px; z-index: 99;
        }
        a.home-link:hover { color: #e07a3a; }

        #header { text-align: center; padding: 22px 20px 6px; }
        #header h1 {
            font-size: 28px; letter-spacing: 10px;
            font-weight: 400; color: #ede8df;
        }
        #header p {
            font-size: 13.5px; font-style: italic;
            color: #9a9080; margin-top: 5px;
        }

        #canvas-wrap {
            position: relative; width: 100%; max-width: 820px;
            padding: 0 12px; margin-top: 6px;
        }
        #mainCanvas {
            width: 100%; height: auto; display: block;
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 3px;
        }

        #start-overlay {
            position: absolute; top: 0; left: 12px; right: 12px; bottom: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: rgba(8,8,14,0.88);
            border-radius: 3px; cursor: pointer;
            transition: opacity 0.9s; z-index: 5;
        }
        #start-overlay.hidden { opacity: 0; pointer-events: none; }
        .overlay-text {
            font-size: 15px; letter-spacing: 4px;
            text-transform: uppercase; color: #e07a3a;
            margin-bottom: 5px;
        }
        .overlay-sub {
            font-size: 12px; color: #887a60; font-style: italic;
        }

        /* System selector */
        #system-row {
            display: flex; align-items: center; justify-content: center;
            gap: 0; padding: 10px 20px 2px;
        }
        .sys-btn {
            padding: 8px 20px; background: none;
            border: 1px solid #2a2520; color: #887a60;
            font-family: 'EB Garamond', Georgia, serif;
            font-size: 12px; letter-spacing: 2px;
            cursor: pointer; transition: all 0.3s;
            text-transform: uppercase;
        }
        .sys-btn:first-child { border-radius: 3px 0 0 3px; }
        .sys-btn:last-child { border-radius: 0 3px 3px 0; }
        .sys-btn:not(:first-child) { border-left: none; }
        .sys-btn.active { background: #e07a3a; border-color: #e07a3a; color: #08080e; }
        .sys-btn:hover:not(.active) { border-color: #e07a3a; color: #c09070; }

        /* Outcome label */
        #outcome {
            text-align: center; padding: 5px 20px 0;
            font-size: 13px; color: #e07a3a;
            letter-spacing: 0.5px; min-height: 22px;
            transition: opacity 0.3s;
        }
        #outcome .silenced { color: #555; font-style: italic; }

        /* Vote row */
        #vote-row {
            display: flex; align-items: center; justify-content: center;
            gap: 8px; padding: 8px 20px; flex-wrap: wrap;
        }
        .vote-btn {
            width: 36px; height: 36px; border-radius: 50%;
            border: 2px solid transparent; cursor: pointer;
            transition: all 0.25s; position: relative;
            opacity: 0.55;
        }
        .vote-btn:hover { opacity: 0.9; transform: scale(1.15); }
        .vote-btn.voted {
            opacity: 1; transform: scale(1.2);
            box-shadow: 0 0 12px rgba(255,255,255,0.15);
        }
        .vote-btn.voted::after {
            content: ''; position: absolute;
            top: -4px; left: -4px; right: -4px; bottom: -4px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50%;
        }

        #vote-label {
            font-size: 10px; color: #555; letter-spacing: 3px;
            text-transform: uppercase; margin-right: 6px;
        }

        /* Controls */
        #ctrl-row {
            display: flex; align-items: center; justify-content: center;
            gap: 16px; padding: 4px 20px 4px;
        }
        .ctrl-btn {
            padding: 5px 16px; background: none;
            border: 1px solid #2a2520; color: #887a60;
            font-family: 'EB Garamond', Georgia, serif;
            font-size: 11px; letter-spacing: 1px;
            cursor: pointer; border-radius: 3px;
            transition: all 0.2s;
        }
        .ctrl-btn:hover { border-color: #e07a3a; color: #e07a3a; }

        #info {
            text-align: center; padding: 10px 24px 32px;
            font-size: 13px; color: #887a60; line-height: 1.8;
            max-width: 520px;
        }
        #info strong { color: #c8c4bc; }
    </style>
</head>
<body>
    <canvas id="grain"></canvas>
    <a class="home-link" href="index.html">&larr; Home</a>

    <div id="header">
        <h1>PARLIAMENT</h1>
        <p>The same people, heard differently</p>
    </div>

    <div id="canvas-wrap">
        <canvas id="mainCanvas" width="820" height="520"></canvas>
        <div id="start-overlay">
            <div class="overlay-text">Click to begin</div>
            <div class="overlay-sub">vote for a party, then change the system</div>
        </div>
    </div>

    <div id="system-row">
        <button class="sys-btn active" data-sys="pr">Proportional</button>
        <button class="sys-btn" data-sys="fptp">First Past Post</button>
        <button class="sys-btn" data-sys="coalition">Coalition</button>
    </div>

    <div id="outcome">&nbsp;</div>

    <div id="vote-row">
        <span id="vote-label">Vote</span>
    </div>

    <div id="ctrl-row">
        <button class="ctrl-btn" id="play-stop">Stop</button>
        <button class="ctrl-btn" id="new-election">New election</button>
    </div>

    <div id="info">
        Seven voices. Three systems for choosing who is heard.<br>
        The votes never change. Only the <strong>rules</strong> do.
    </div>

<script>
(function() {
    // ==========================================
    // PARTIES
    // ==========================================
    var PARTIES = [
        { name: 'Red',    hex: '#d94040', r: 217, g: 64,  b: 64  },
        { name: 'Coral',  hex: '#e07a3a', r: 224, g: 122, b: 58  },
        { name: 'Amber',  hex: '#d4a842', r: 212, g: 168, b: 66  },
        { name: 'Green',  hex: '#5cb86c', r: 92,  g: 184, b: 108 },
        { name: 'Teal',   hex: '#46b8b8', r: 70,  g: 184, b: 184 },
        { name: 'Blue',   hex: '#4a8edd', r: 74,  g: 142, b: 221 },
        { name: 'Violet', hex: '#9a7ad8', r: 154, g: 122, b: 216 },
    ];
    var N = PARTIES.length;
    var POP = 300;

    // Musical definitions per party — base note, scale role, rhythmic character
    // Each voice gets: fundamental, timbre (osc types + harmonics), a simple melodic motif
    var VOICES = [
        { fund: 130.81, type: 'sawtooth', harmonics: [1, 0.5, 0.3], rhythm: [1,0,0,1,0,0,1,0], detune: 0 },      // Red — low C3, growling
        { fund: 164.81, type: 'triangle', harmonics: [1, 0.3, 0.1], rhythm: [0,1,0,0,1,0,0,1], detune: 2 },      // Coral — E3, warm
        { fund: 196.00, type: 'sine',     harmonics: [1, 0.6, 0.4, 0.2], rhythm: [1,0,1,0,0,1,0,0], detune: 0 }, // Amber — G3, bell-like
        { fund: 246.94, type: 'triangle', harmonics: [1, 0.2],      rhythm: [0,0,1,0,1,0,0,1], detune: -3 },      // Green — B3, singing
        { fund: 293.66, type: 'sine',     harmonics: [1, 0.4, 0.15], rhythm: [1,0,0,0,1,0,1,0], detune: 5 },     // Teal — D4, bright
        { fund: 349.23, type: 'triangle', harmonics: [1, 0.15],     rhythm: [0,1,0,1,0,0,0,1], detune: -2 },      // Blue — F4, flute
        { fund: 415.30, type: 'sine',     harmonics: [1, 0.1, 0.05], rhythm: [0,0,1,0,0,1,0,0], detune: 7 },     // Violet — Ab4, ethereal
    ];

    // Melodic intervals per party (semitones from fundamental, cycles through)
    var MELODIES = [
        [0, 0, -2, 0, 3, 0, -2, 0],
        [0, 4, 7, 4, 0, -1, 0, 4],
        [0, 0, 5, 7, 5, 0, 0, -5],
        [0, 3, 7, 10, 7, 3, 0, -2],
        [0, 0, 2, 0, -2, 0, 5, 0],
        [0, 7, 5, 3, 0, 3, 5, 7],
        [0, 0, 0, 12, 0, 0, 7, 0],
    ];

    // ==========================================
    // STATE
    // ==========================================
    var canvas = document.getElementById('mainCanvas');
    var ctx = canvas.getContext('2d');
    var W = 820, H = 520;
    var overlay = document.getElementById('start-overlay');
    var outcomeEl = document.getElementById('outcome');
    var voteRow = document.getElementById('vote-row');
    var sysBtns = document.querySelectorAll('.sys-btn');

    var started = false;
    var playing = true;
    var system = 'pr';
    var playerVote = -1;
    var votes = new Array(N).fill(0);
    var votePct = new Array(N).fill(0);
    var hasVoted = false;

    // Audio
    var audioCtx = null;
    var voiceNodes = [];  // per-party: { oscs, gain, filter }
    var masterGain = null;
    var masterComp = null;
    var voiceTargetGains = new Array(N).fill(0);
    var voiceCurrentGains = new Array(N).fill(0);

    // Particles
    var particles = [];
    var particleTargetAlpha = [];

    // Step sequencer
    var TEMPO = 108; // BPM
    var stepIndex = 0;
    var lastStepTime = 0;
    var STEPS = 8;

    // ==========================================
    // GRAIN
    // ==========================================
    (function() {
        var gc = document.getElementById('grain');
        gc.width = window.innerWidth; gc.height = window.innerHeight;
        var gctx = gc.getContext('2d');
        var gi = gctx.createImageData(gc.width, gc.height);
        var gd = gi.data;
        for (var i = 0; i < gd.length; i += 4) {
            var v = Math.floor(Math.random() * 255);
            gd[i] = gd[i+1] = gd[i+2] = v; gd[i+3] = 255;
        }
        gctx.putImageData(gi, 0, 0);
    })();

    // ==========================================
    // ELECTION
    // ==========================================
    function runElection() {
        votes = new Array(N).fill(0);
        votePct = new Array(N).fill(0);
        // Weight distribution — competitive, no single party dominates
        var weights = [];
        var totalW = 0;
        for (var i = 0; i < N; i++) {
            weights[i] = 0.6 + Math.random() * 1.0;
            totalW += weights[i];
        }
        // Moderate boost to 3-4 parties (smaller boosts = tighter races)
        var boosts = 3 + Math.floor(Math.random() * 2);
        for (var b = 0; b < boosts; b++) {
            var bi = Math.floor(Math.random() * N);
            weights[bi] += 0.8 + Math.random() * 1.4;
        }
        totalW = 0;
        for (var i = 0; i < N; i++) totalW += weights[i];
        for (var v = 0; v < POP; v++) {
            var r = Math.random() * totalW, s = 0;
            for (var i = 0; i < N; i++) {
                s += weights[i];
                if (r <= s) { votes[i]++; break; }
            }
        }
        if (playerVote >= 0) votes[playerVote]++;
        var total = 0;
        for (var i = 0; i < N; i++) total += votes[i];
        for (var i = 0; i < N; i++) votePct[i] = total > 0 ? votes[i] / total : 0;
    }

    function getWinner() {
        var mx = -1, w = 0;
        for (var i = 0; i < N; i++) if (votes[i] > mx) { mx = votes[i]; w = i; }
        return w;
    }

    function getCoalition() {
        var sorted = [];
        for (var i = 0; i < N; i++) sorted.push({ idx: i, pct: votePct[i] });
        sorted.sort(function(a, b) { return b.pct - a.pct; });
        var coal = [], total = 0;
        for (var i = 0; i < sorted.length; i++) {
            coal.push(sorted[i].idx);
            total += sorted[i].pct;
            if (total > 0.5) break;
        }
        return coal;
    }

    // ==========================================
    // PARTICLES — the electorate as a living field
    // ==========================================
    function createParticles() {
        particles = [];
        particleTargetAlpha = [];
        for (var i = 0; i < N; i++) {
            var count = votes[i];
            for (var j = 0; j < count; j++) {
                // Cluster loosely by party region but with overlap
                var cx = (i + 0.5) / N * (W - 120) + 60;
                var cy = H / 2;
                // Spread with Gaussian-ish distribution
                var r1 = Math.random() + Math.random() + Math.random();
                var r2 = Math.random() + Math.random() + Math.random();
                var x = cx + (r1 - 1.5) * 130;
                var y = cy + (r2 - 1.5) * 160;
                x = Math.max(12, Math.min(W - 12, x));
                y = Math.max(12, Math.min(H - 12, y));

                particles.push({
                    x: x, y: y,
                    baseX: x, baseY: y,
                    party: i,
                    size: 2.2 + Math.random() * 2.2,
                    phase: Math.random() * Math.PI * 2,
                    driftSpeed: 0.3 + Math.random() * 0.5,
                    driftRadius: 3 + Math.random() * 8,
                    alpha: 0,
                    targetAlpha: 0.7,
                    pulsePhase: Math.random() * Math.PI * 2,
                    isUser: false,
                });
            }
        }
    }

    function updateParticleTargets() {
        var winner = getWinner();
        var coalition = getCoalition();

        for (var i = 0; i < particles.length; i++) {
            var p = particles[i];
            var partyIdx = p.party;
            var active;
            if (system === 'fptp') {
                active = (partyIdx === winner);
            } else if (system === 'pr') {
                active = true;
            } else {
                active = coalition.indexOf(partyIdx) >= 0;
            }
            p.targetAlpha = active ? (0.6 + votePct[partyIdx] * 0.6) : 0.04;
        }
    }

    // ==========================================
    // AUDIO
    // ==========================================
    function buildAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        masterComp = audioCtx.createDynamicsCompressor();
        masterComp.threshold.value = -20;
        masterComp.ratio.value = 6;
        masterComp.knee.value = 10;
        masterComp.connect(audioCtx.destination);

        masterGain = audioCtx.createGain();
        masterGain.gain.value = 0.22;
        masterGain.connect(masterComp);

        // Reverb
        var len = audioCtx.sampleRate * 3;
        var buf = audioCtx.createBuffer(2, len, audioCtx.sampleRate);
        for (var ch = 0; ch < 2; ch++) {
            var d = buf.getChannelData(ch);
            for (var i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.5);
        }
        var convolver = audioCtx.createConvolver();
        convolver.buffer = buf;
        var revGain = audioCtx.createGain();
        revGain.gain.value = 0.25;
        convolver.connect(revGain);
        revGain.connect(masterGain);

        // Build each party's voice
        voiceNodes = [];
        for (var i = 0; i < N; i++) {
            var v = VOICES[i];
            var voiceGain = audioCtx.createGain();
            voiceGain.gain.value = 0;

            var filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 1200 + i * 300;
            filter.Q.value = 0.5;
            filter.connect(voiceGain);

            voiceGain.connect(masterGain);
            voiceGain.connect(convolver);

            // Create oscillators for harmonics
            var oscs = [];
            for (var h = 0; h < v.harmonics.length; h++) {
                var osc = audioCtx.createOscillator();
                osc.type = h === 0 ? v.type : 'sine';
                osc.frequency.value = v.fund * (h + 1);
                osc.detune.value = v.detune + (h > 0 ? h * 2 : 0);
                var hGain = audioCtx.createGain();
                hGain.gain.value = v.harmonics[h] * 0.3;
                osc.connect(hGain);
                hGain.connect(filter);
                osc.start();
                oscs.push({ osc: osc, hGain: hGain, baseFreq: v.fund * (h + 1) });
            }

            voiceNodes.push({
                oscs: oscs,
                gain: voiceGain,
                filter: filter,
                melodyIndex: 0,
            });
        }
    }

    function updateVoiceTargets() {
        var winner = getWinner();
        var coalition = getCoalition();

        for (var i = 0; i < N; i++) {
            var active;
            if (system === 'fptp') {
                active = (i === winner);
            } else if (system === 'pr') {
                active = true;
            } else {
                active = coalition.indexOf(i) >= 0;
            }

            if (!active) {
                voiceTargetGains[i] = 0;
            } else if (system === 'pr') {
                // Proportional: volume = vote share (but with a floor so small parties are audible)
                voiceTargetGains[i] = 0.15 + votePct[i] * 1.8;
            } else if (system === 'fptp') {
                // Winner takes all — full volume
                voiceTargetGains[i] = 1.2;
            } else {
                // Coalition: proportional within coalition
                var coalTotal = 0;
                for (var c = 0; c < coalition.length; c++) coalTotal += votePct[coalition[c]];
                voiceTargetGains[i] = coalTotal > 0 ? (votePct[i] / coalTotal) * 1.1 : 0;
            }
        }
    }

    function advanceStep() {
        if (!audioCtx) return;
        var t = audioCtx.currentTime;

        for (var i = 0; i < N; i++) {
            var v = VOICES[i];
            var node = voiceNodes[i];
            var mel = MELODIES[i];

            // Check if this step has a note
            if (v.rhythm[stepIndex % STEPS] === 1 && voiceCurrentGains[i] > 0.01) {
                // Get melody note
                var semitones = mel[node.melodyIndex % mel.length];
                node.melodyIndex++;
                var freq = v.fund * Math.pow(2, semitones / 12);

                // Glide oscillators to new pitch
                for (var h = 0; h < node.oscs.length; h++) {
                    var target = freq * (h + 1);
                    node.oscs[h].osc.frequency.linearRampToValueAtTime(target, t + 0.06);
                }

                // Articulation envelope on the filter
                node.filter.frequency.cancelScheduledValues(t);
                node.filter.frequency.setValueAtTime(2500 + i * 200, t);
                node.filter.frequency.exponentialRampToValueAtTime(600 + i * 200, t + 0.35);
            }
        }

        stepIndex++;
    }

    function updateAudioGains(dt) {
        if (!audioCtx) return;
        var t = audioCtx.currentTime;
        for (var i = 0; i < N; i++) {
            // Smooth interpolation
            voiceCurrentGains[i] += (voiceTargetGains[i] - voiceCurrentGains[i]) * Math.min(1, dt * 3.5);
            voiceNodes[i].gain.gain.linearRampToValueAtTime(
                Math.max(0, voiceCurrentGains[i]), t + 0.05
            );
        }
    }

    // ==========================================
    // RENDERING
    // ==========================================
    function render(t) {
        ctx.fillStyle = '#08080e';
        ctx.fillRect(0, 0, W, H);

        // Draw particles
        for (var i = 0; i < particles.length; i++) {
            var p = particles[i];

            // Drift
            var time = t / 1000;
            p.x = p.baseX + Math.sin(time * p.driftSpeed + p.phase) * p.driftRadius;
            p.y = p.baseY + Math.cos(time * p.driftSpeed * 0.7 + p.phase + 1.3) * p.driftRadius * 0.6;

            // Alpha interpolation
            p.alpha += (p.targetAlpha - p.alpha) * 0.04;

            // Pulse on beat (subtle)
            var pulse = 1.0;
            if (p.alpha > 0.15) {
                var beatPhase = (stepIndex % 4) / 4;
                pulse = 1.0 + Math.max(0, Math.sin(beatPhase * Math.PI * 2) * 0.15);
            }

            var party = PARTIES[p.party];
            var size = p.size * pulse;

            // Glow for active particles
            if (p.alpha > 0.2) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, size + 4, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(' + party.r + ',' + party.g + ',' + party.b + ',' + (p.alpha * 0.06) + ')';
                ctx.fill();
            }

            // Core
            ctx.beginPath();
            ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(' + party.r + ',' + party.g + ',' + party.b + ',' + p.alpha + ')';
            ctx.fill();

            // Bright center for highly active
            if (p.alpha > 0.4) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, size * 0.4, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,' + (p.alpha * 0.15) + ')';
                ctx.fill();
            }

            // User's vote marker
            if (p.isUser) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, size + 7, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255,255,255,' + (0.3 + Math.sin(time * 2) * 0.15) + ')';
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }

        // Party labels along bottom
        ctx.font = '10px "EB Garamond", Georgia, serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        for (var i = 0; i < N; i++) {
            var cx = (i + 0.5) / N * (W - 120) + 60;
            var pct = Math.round(votePct[i] * 100);
            var active = isPartyActive(i);
            var alpha = active ? 0.6 : 0.12;
            ctx.fillStyle = 'rgba(' + PARTIES[i].r + ',' + PARTIES[i].g + ',' + PARTIES[i].b + ',' + alpha + ')';
            ctx.fillText(PARTIES[i].name + ' ' + pct + '%', cx, H - 6);
        }

        // System label top-right
        ctx.font = '10px "EB Garamond", Georgia, serif';
        ctx.textAlign = 'right';
        ctx.fillStyle = 'rgba(224,122,58,0.3)';
        var sysLabel = system === 'fptp' ? 'FIRST PAST THE POST' :
                       system === 'pr' ? 'PROPORTIONAL REPRESENTATION' : 'COALITION';
        ctx.fillText(sysLabel, W - 14, 18);
    }

    function isPartyActive(idx) {
        if (system === 'fptp') return idx === getWinner();
        if (system === 'pr') return true;
        return getCoalition().indexOf(idx) >= 0;
    }

    // ==========================================
    // OUTCOME TEXT
    // ==========================================
    function updateOutcome() {
        if (!hasVoted) { outcomeEl.innerHTML = '&nbsp;'; return; }

        var winner = getWinner();
        var coalition = getCoalition();

        if (system === 'fptp') {
            var silencedPct = Math.round((1 - votePct[winner]) * 100);
            outcomeEl.innerHTML = PARTIES[winner].name + ' governs alone. '
                + '<span class="silenced">' + silencedPct + '% of voices produce no sound.</span>';
        } else if (system === 'pr') {
            outcomeEl.innerHTML = 'Every voice is heard in proportion.';
        } else {
            var names = coalition.map(function(i) { return PARTIES[i].name; });
            var coalPct = 0;
            for (var c = 0; c < coalition.length; c++) coalPct += votePct[coalition[c]];
            coalPct = Math.round(coalPct * 100);
            outcomeEl.innerHTML = names.join(' + ') + ' form a coalition. '
                + '<span class="silenced">' + (100 - coalPct) + '% unheard.</span>';
        }
    }

    // ==========================================
    // INTERACTION
    // ==========================================
    // Vote buttons
    function buildVoteButtons() {
        var existing = voteRow.querySelectorAll('.vote-btn');
        existing.forEach(function(el) { el.remove(); });
        for (var i = 0; i < N; i++) {
            var btn = document.createElement('button');
            btn.className = 'vote-btn';
            btn.style.background = PARTIES[i].hex;
            btn.setAttribute('data-party', i);
            btn.title = PARTIES[i].name;
            btn.addEventListener('click', (function(idx) {
                return function() { castVote(idx); };
            })(i));
            voteRow.appendChild(btn);
        }
    }
    buildVoteButtons();

    function castVote(idx) {
        if (playerVote >= 0) {
            votes[playerVote]--;
        }
        playerVote = idx;
        if (!hasVoted) {
            hasVoted = true;
            runElection();
        } else {
            votes[playerVote]++;
            var total = 0;
            for (var i = 0; i < N; i++) total += votes[i];
            for (var i = 0; i < N; i++) votePct[i] = total > 0 ? votes[i] / total : 0;
        }

        // Mark user's particle
        for (var i = 0; i < particles.length; i++) particles[i].isUser = false;
        createParticles();
        // Find one particle of the player's party and mark it
        for (var i = 0; i < particles.length; i++) {
            if (particles[i].party === playerVote) {
                particles[i].isUser = true;
                break;
            }
        }

        updateParticleTargets();
        if (playing) updateVoiceTargets();
        updateOutcome();
        updateVoteButtons();
    }

    function updateVoteButtons() {
        var btns = voteRow.querySelectorAll('.vote-btn');
        btns.forEach(function(btn) {
            var idx = parseInt(btn.getAttribute('data-party'));
            btn.classList.toggle('voted', idx === playerVote);
        });
    }

    // System toggle
    sysBtns.forEach(function(btn) {
        btn.addEventListener('click', function() {
            var s = btn.getAttribute('data-sys');
            if (s === system) return;
            system = s;
            sysBtns.forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            updateParticleTargets();
            if (playing) updateVoiceTargets();
            updateOutcome();
        });
    });

    // New election
    document.getElementById('new-election').addEventListener('click', function() {
        runElection();
        createParticles();
        if (playerVote >= 0) {
            for (var i = 0; i < particles.length; i++) {
                if (particles[i].party === playerVote) {
                    particles[i].isUser = true;
                    break;
                }
            }
        }
        updateParticleTargets();
        if (playing) updateVoiceTargets();
        updateOutcome();
    });

    // Play/Stop
    var playStopBtn = document.getElementById('play-stop');
    playStopBtn.addEventListener('click', function() {
        playing = !playing;
        playStopBtn.textContent = playing ? 'Stop' : 'Play';
        if (audioCtx) {
            if (playing) {
                audioCtx.resume();
                updateVoiceTargets();
            } else {
                // Fade all voices to zero
                var t = audioCtx.currentTime;
                for (var i = 0; i < N; i++) {
                    voiceTargetGains[i] = 0;
                    voiceNodes[i].gain.gain.linearRampToValueAtTime(0, t + 0.3);
                    voiceCurrentGains[i] = 0;
                }
            }
        }
    });

    // Start
    function beginExperience() {
        if (started) return;
        started = true;

        // Unlock audio IMMEDIATELY on user gesture — before any other work
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioCtx.resume();

        overlay.classList.add('hidden');

        // Pre-populate an election for visual interest
        runElection();
        createParticles();
        updateParticleTargets();

        // Build audio graph on the already-resuming context
        buildAudio();
        updateVoiceTargets();

        // Seed gains so the very first beat isn't gated by the > 0.01 check
        for (var i = 0; i < N; i++) {
            voiceCurrentGains[i] = voiceTargetGains[i] * 0.5;
        }

        lastStepTime = performance.now();
        tick(performance.now());
    }
    overlay.addEventListener('click', beginExperience);
    overlay.addEventListener('touchstart', function(e) {
        e.preventDefault(); beginExperience();
    }, { passive: false });

    // ==========================================
    // MAIN LOOP
    // ==========================================
    var lastFrameTime = 0;

    function tick(ts) {
        var dt = Math.min(0.1, (ts - (lastFrameTime || ts)) / 1000);
        lastFrameTime = ts;

        // Step sequencer (only when playing)
        if (playing) {
            var stepInterval = (60 / TEMPO) * 1000 / 2; // eighth notes
            if (ts - lastStepTime >= stepInterval) {
                lastStepTime = ts;
                advanceStep();
            }
        }

        // Smooth audio gains
        updateAudioGains(dt);

        // Render (always — particles stay visible)
        render(ts);

        requestAnimationFrame(tick);
    }

    // Initial render
    ctx.fillStyle = '#08080e';
    ctx.fillRect(0, 0, W, H);

})();
</script>
</body>
</html>
